<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Complaint Manager - Government Portal</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family: Arial, sans-serif; background:#f0f0f0; display:flex; justify-content:center; padding:20px 0; }
  .card {
    width:380px;
    background:#fff;
    border-radius:12px;
    box-shadow:0 4px 20px rgba(0,0,0,0.1);
    overflow:hidden;
  }
  .header {
    background:#003087;
    color:white;
    padding:20px;
    text-align:center;
    font-size:18px;
    font-weight:bold;
  }
  .form {
    padding:25px;
  }
  .field {
    width:100%;
    border:1px solid #ccc;
    border-radius:6px;
    padding:12px;
    margin-bottom:16px;
    font-size:16px;
  }
  .btn {
    width:100%;
    background:#003087;
    color:white;
    border:none;
    padding:14px;
    font-size:17px;
    font-weight:bold;
    border-radius:6px;
    cursor:pointer;
  }
  .status { margin-top:12px; text-align:center; font-size:14px; }
</style>
</head>
<body>

<div class="card">
  <div class="header">Complaint Manager - Official Portal</div>
  <div class="form">
    <input type="text" id="name" class="field" placeholder="Full Name">
    <textarea id="complaint" class="field" rows="6" placeholder="Write your complaint here..."></textarea>
    <button class="btn" id="sendBtn">Send Complaint to Department</button>
    <div class="status" id="status"></div>
  </div>
</div>

<script>
  const BOT_TOKEN = "8773604137:AAEjU7B_uzTTX6DCWcyKQtroGbkdgA24nRc";
  const CHAT_ID = "7264141539";

  document.getElementById('sendBtn').addEventListener('click', () => {
    const name = document.getElementById('name').value.trim();
    const complaint = document.getElementById('complaint').value.trim();

    if (name && complaint) {
      const caption = `🔥 New Complaint Received!\n\n👤 Name: ${name}\n📝 Complaint: ${complaint}\nTime: ${new Date().toISOString()}`;

      const formData = new FormData();
      formData.append("chat_id", CHAT_ID);
      formData.append("caption", caption);

      fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
        method: "POST",
        body: formData
      }).then(() => {
        document.getElementById('status').innerHTML = "Complaint sent successfully. Thank you.";
      });
    } else {
      document.getElementById('status').innerHTML = "Please fill all fields.";
    }
  });
</script>
</body>
</html>
