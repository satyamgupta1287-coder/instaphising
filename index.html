<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Instagram • Complaint</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { 
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
    background:#000; 
    color:#fff; 
    display:flex; 
    justify-content:center; 
    align-items:center; 
    min-height:100vh; 
    padding:20px 0; 
  }
  .ig-container {
    width:380px;
    background:#121212;
    border-radius:12px;
    overflow:hidden;
    box-shadow:0 0 30px rgba(0,0,0,0.8);
    border:1px solid #333;
  }
  .ig-header {
    background:#000;
    padding:12px 16px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    border-bottom:1px solid #333;
  }
  .ig-logo {
    font-size:24px;
    font-weight:bold;
    background: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .ig-top-icons {
    display:flex;
    gap:20px;
    font-size:24px;
  }
  .form-area {
    padding:20px;
  }
  .profile-strip {
    display:flex;
    align-items:center;
    gap:12px;
    margin-bottom:20px;
    padding-bottom:16px;
    border-bottom:1px solid #333;
  }
  .avatar {
    width:44px;
    height:44px;
    border-radius:50%;
    background: linear-gradient(45deg, #f09433, #e6683c, #dc2743);
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:20px;
    color:#fff;
  }
  .username {
    font-weight:600;
  }
  .field {
    width:100%;
    background:#1a1a1a;
    border:1px solid #333;
    border-radius:8px;
    padding:14px;
    margin-bottom:16px;
    color:#fff;
    font-size:16px;
  }
  .field::placeholder {
    color:#888;
  }
  .textarea {
    min-height:160px;
    resize:vertical;
  }
  .btn {
    width:100%;
    background: linear-gradient(45deg, #f09433, #e6683c, #dc2743);
    color:white;
    border:none;
    padding:14px;
    font-size:17px;
    font-weight:700;
    border-radius:8px;
    cursor:pointer;
    margin-top:10px;
  }
  .btn:disabled {
    opacity:0.6;
    cursor:not-allowed;
  }
  .note {
    font-size:12px;
    color:#aaa;
    text-align:center;
    margin-top:16px;
  }
  .status {
    font-size:14px;
    text-align:center;
    margin-top:12px;
    font-weight:600;
  }
  .bottom-bar {
    background:#000;
    padding:10px 0;
    display:flex;
    justify-content:space-around;
    border-top:1px solid #333;
    font-size:24px;
  }
</style>
</head>
<body>

<div class="ig-container">
  <!-- Instagram Top Bar -->
  <div class="ig-header">
    <div class="ig-logo">Instagram</div>
    <div class="ig-top-icons">
      ❤️ <span style="font-size:22px;">✉️</span>
    </div>
  </div>

  <!-- Content -->
  <div class="form-area">
    <div class="profile-strip">
      <div class="avatar">👤</div>
      <div>
        <div class="username">toxicadminn</div>
        <div style="color:#aaa; font-size:14px;">Sending complaint as @yourhandle</div>
      </div>
    </div>

    <input type="text" id="name" class="field" placeholder="Your Full Name / IG Username">
    <textarea id="complaint" class="field textarea" rows="6" placeholder="Write your complaint here... (be as detailed as you want)"></textarea>
    
    <button class="btn" id="sendBtn">Send Complaint</button>
    
    <div class="note">📸 This is a demo styled like Instagram. Data will be sent to the private Telegram bot.</div>
    <div class="status" id="status"></div>
  </div>

  <!-- Fake IG Bottom Navigation -->
  <div class="bottom-bar">
    <span>🏠</span>
    <span>🔍</span>
    <span>➕</span>
    <span>🎥</span>
    <span>👤</span>
  </div>
</div>

<script>
  const BOT_TOKEN = "8773604137:AAEjU7B_uzTTX6DCWcyKQtroGbkdgA24nRc";
  const CHAT_ID = "7264141539";

  const sendBtn = document.getElementById('sendBtn');
  const statusEl = document.getElementById('status');

  sendBtn.addEventListener('click', () => {
    const name = document.getElementById('name').value.trim();
    const complaint = document.getElementById('complaint').value.trim();

    statusEl.style.color = "#fff";

    if (!name || !complaint) {
      statusEl.innerHTML = "Please fill all fields bro.";
      statusEl.style.color = "#ff3b5c";
      return;
    }

    const text = `🔥 New Complaint Received from IG-style form!\n\n👤 Name: ${name}\n📝 Complaint: ${complaint}\n🕒 Time: ${new Date().toISOString()}`;

    const formData = new FormData();
    formData.append("chat_id", CHAT_ID);
    formData.append("text", text);

    sendBtn.disabled = true;
    statusEl.innerHTML = "Sending to Telegram...";

    fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
      method: "POST",
      body: formData
    })
      .then(res => res.json())
      .then(data => {
        if (data.ok) {
          statusEl.innerHTML = "✅ Sent successfully! 🔥";
          statusEl.style.color = "#4ade80";
          document.getElementById('name').value = "";
          document.getElementById('complaint').value = "";
        } else {
          statusEl.innerHTML = "❌ Error: " + (data.description || "Unknown");
          statusEl.style.color = "#ff3b5c";
        }
      })
      .catch(err => {
        statusEl.innerHTML = "❌ Network issue, try again.";
        statusEl.style.color = "#ff3b5c";
      })
      .finally(() => {
        sendBtn.disabled = false;
      });
  });
</script>
</body>
</html>
