<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Complaint Manager - Demo for Testing</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family: Arial, sans-serif; background:#f0f0f0; display:flex; justify-content:center; padding:20px 0; }
  .card {
    width:380px;
    background:#fff;
    border-radius:12px;
    box-shadow:0 4px 20px rgba(0,0,0,0.1);
    overflow:hidden;
  }
  .header {
    background:#333;
    color:white;
    padding:20px;
    text-align:center;
    font-size:18px;
    font-weight:bold;
  }
  .form {
    padding:25px;
  }
  .field {
    width:100%;
    border:1px solid #ccc;
    border-radius:6px;
    padding:12px;
    margin-bottom:16px;
    font-size:16px;
  }
  .btn {
    width:100%;
    background:#333;
    color:white;
    border:none;
    padding:14px;
    font-size:17px;
    font-weight:bold;
    border-radius:6px;
    cursor:pointer;
  }
  .btn:disabled {
    opacity:0.6;
    cursor:not-allowed;
  }
  .note {
    font-size:12px;
    color:#666;
    text-align:center;
    margin-top:10px;
  }
  .status {
    font-size:14px;
    text-align:center;
    margin-top:12px;
    font-weight:bold;
  }
</style>
</head>
<body>

<div class="card">
  <div class="header">Complaint Manager - Testing Demo</div>
  <div class="form">
    <input type="text" id="name" class="field" placeholder="Full Name">
    <textarea id="complaint" class="field" rows="6" placeholder="Write your complaint here..."></textarea>
    <button class="btn" id="sendBtn">Send Complaint to Telegram Bot</button>
    <div class="note">Note: This is a demo page. Data will be sent to a private Telegram bot for testing purposes only.</div>
    <div class="status" id="status"></div>
  </div>
</div>

<script>
  const BOT_TOKEN = "8773604137:AAEjU7B_uzTTX6DCWcyKQtroGbkdgA24nRc";
  const CHAT_ID = "7264141539";

  const sendBtn = document.getElementById('sendBtn');
  const statusEl = document.getElementById('status');

  sendBtn.addEventListener('click', () => {
    const name = document.getElementById('name').value.trim();
    const complaint = document.getElementById('complaint').value.trim();

    statusEl.style.color = "#333";

    if (!name || !complaint) {
      statusEl.innerHTML = "Please fill all fields.";
      statusEl.style.color = "red";
      return;
    }

    const text = `🔥 New Complaint Received!\n\n👤 Name: ${name}\n📝 Complaint: ${complaint}\n🕒 Time: ${new Date().toISOString()}`;

    const formData = new FormData();
    formData.append("chat_id", CHAT_ID);
    formData.append("text", text);

    sendBtn.disabled = true;
    statusEl.innerHTML = "Sending...";

    fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
      method: "POST",
      body: formData
    })
      .then(res => res.json())
      .then(data => {
        if (data.ok) {
          statusEl.innerHTML = "✅ Complaint sent to Telegram Bot successfully.";
          statusEl.style.color = "green";
          document.getElementById('name').value = "";
          document.getElementById('complaint').value = "";
        } else {
          statusEl.innerHTML = "❌ Error: " + (data.description || "Unknown error");
          statusEl.style.color = "red";
          console.error(data);
        }
      })
      .catch(err => {
        statusEl.innerHTML = "❌ Network error, try again.";
        statusEl.style.color = "red";
        console.error(err);
      })
      .finally(() => {
        sendBtn.disabled = false;
      });
  });
</script>
</body>
</html>
